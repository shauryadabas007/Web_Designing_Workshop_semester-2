<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lab</title>
    <link rel="stylesheet" href="Experiment 6.css">
</head>
<body>

    <div class="lab-card">
        <h1 id="labHeading">Welcome to JavaScript Lab</h1>
        
        <div class="input-container">
            <input type="text" id="textInput" placeholder="Enter new heading text">
        </div>

        <div class="button-container">
            <div class="button-row">
                <button id="btnHeading">Change Heading</button>
                <button id="btnBackground">Change Background</button>
                <button id="btnFontSize">Increase Font Size</button>
            </div>
            <div class="button-row">
                <button id="btnTogglePara">Show/Hide Paragraph</button>
                <button id="btnReset">Reset</button>
            </div>
        </div>

        <p id="labParagraph">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>

    <script src="Experiment 6.js"></script>
</body>
</html>
